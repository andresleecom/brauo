<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Brauo</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;700&amp;display=swap">
  <style>
    html, body {
      width: 440px;
      height: 280px;
      margin: 0;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0d1120 0%, #0a0d16 100%);
      font-family: system-ui, Arial, Helvetica, sans-serif;
    }
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    img {
      width: 96px;
      height: 96px;
      filter: drop-shadow(0 8px 14px rgba(0, 0, 0, .28));
    }
    h1 {
      margin: 7px 0 8px;
      color: #eef2f8;
      font-family: 'Schibsted Grotesk', system-ui, sans-serif;
      font-size: 44px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -.8px;
    }
    .rule {
      width: 54px;
      height: 2px;
      background: #9ccbe8;
    }
    p {
      margin: 9px 0 0;
      color: #93a0b4;
      font-size: 17px;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <main>
    <img src="../icons/icon128.png" alt="">
    <h1>Brauo</h1>
    <div class="rule"></div>
    <p>Read any page aloud</p>
  </main>
</body>
</html>
