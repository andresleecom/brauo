<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brauo</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #eef2f8;
      background: #0a0d16;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 316px;
      margin: 0;
      padding: 8px;
      background: #0a0d16;
    }

    .card {
      width: 300px;
      padding: 14px;
      border: 1px solid rgba(238, 242, 248, 0.12);
      border-radius: 8px;
      background: #0d1120;
    }

    header {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(238, 242, 248, 0.12);
    }

    header strong {
      font-size: 15px;
      letter-spacing: 0.01em;
    }

    #plan {
      color: #9ccbe8;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    #ready,
    #setup {
      display: none;
      padding-top: 12px;
    }

    p {
      margin: 0 0 10px;
      color: #eef2f8;
      font-size: 13px;
      line-height: 1.4;
    }

    button,
    input {
      width: 100%;
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .primary {
      padding: 9px 12px;
      border-radius: 8px;
      color: #0a0d16;
      background: #9ccbe8;
      font-weight: 700;
    }

    .links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }

    .links a,
    .links button {
      width: auto;
      padding: 2px 0;
      color: #93a0b4;
      background: transparent;
      font-size: 12px;
      text-decoration: none;
      cursor: pointer;
    }

    label {
      display: block;
      margin: 12px 0 5px;
      color: #93a0b4;
      font-size: 12px;
    }

    input {
      padding: 8px 9px;
      border: 1px solid rgba(238, 242, 248, 0.12);
      border-radius: 8px;
      outline: none;
      color: #eef2f8;
      background: #0a0d16;
    }

    input:focus {
      border-color: #9ccbe8;
    }

    #save {
      margin-top: 8px;
    }

    .hint {
      margin: 7px 0 0;
      color: #75819a;
      font-size: 11px;
    }

    #status {
      margin: 10px 0 0;
      color: #e08c8c;
      font-size: 12px;
    }

    #status:empty {
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <header>
      <svg width="18" height="18" viewBox="0 0 64 64" fill="none" aria-hidden="true"><path d="M16 17 L30 32 L16 47" stroke="#9ccbe8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><path d="M34 17 L48 32 L34 47" stroke="#eef2f8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <strong>Brauo</strong>
      <span id="plan"></span>
    </header>

    <section id="ready">
      <p id="credits"></p>
      <button id="read" class="primary" type="button">▶ Read this page</button>
      <div class="links">
        <a id="account">Account</a>
        <button id="options" type="button">Options</button>
      </div>
      <a id="upgrade" class="hint" href="https://brauo.com/pricing" target="_blank" style="display:none;color:#9ccbe8;text-decoration:none">Unlock all voices &rarr;</a>
    </section>

    <section id="setup">
      <p>Read any page aloud with natural voices.</p>
      <button id="signin" class="primary" type="button">Sign in with Brauo</button>
      <div class="links">
        <button id="create" type="button">Create a free account</button>
      </div>
      <label for="key">or paste an API key</label>
      <input id="key" type="password" placeholder="brauo_sk_...">
      <button id="save" class="primary" type="button">Save</button>
      <p class="hint">Get your key at brauo.com after signing up.</p>
    </section>

    <p id="status"></p>
  </main>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
