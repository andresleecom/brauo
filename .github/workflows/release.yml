name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check manifest version matches tag
        run: |
          manifest="$(node -p "require('./manifest.json').version")"
          if [ "$manifest" != "${{ steps.v.outputs.version }}" ]; then
            echo "manifest version $manifest does not match tag ${{ steps.v.outputs.version }}" >&2
            exit 1
          fi

      - name: Build package
        run: |
          zip -r -X "brauo-${{ steps.v.outputs.version }}.zip" \
            manifest.json background.js content.js content.css \
            options.html options.js popup.html popup.js shared.js voices.js icons _locales

      - name: Generate checksum
        run: sha256sum "brauo-${{ steps.v.outputs.version }}.zip" | tee "brauo-${{ steps.v.outputs.version }}.zip.sha256"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "brauo-${{ steps.v.outputs.version }}.zip"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.v.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          sha="$(cut -d ' ' -f1 "brauo-${VERSION}.zip.sha256")"
          cat > notes.md <<NOTES
          SHA-256 of brauo-${VERSION}.zip: ${sha}

          Install and verification: https://github.com/${REPO}#verify-your-download

          This zip was built by GitHub Actions from this tag and carries a build-provenance attestation. Verify:
          gh attestation verify brauo-${VERSION}.zip --repo ${REPO}
          NOTES
          gh release create "v${VERSION}" \
            "brauo-${VERSION}.zip" \
            "brauo-${VERSION}.zip.sha256" \
            --title "Brauo v${VERSION}" \
            --notes-file notes.md
